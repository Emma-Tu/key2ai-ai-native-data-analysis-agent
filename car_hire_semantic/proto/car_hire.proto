}


// vendor-mapping event
message CarhireVendorMappingSearch {
  commons.LightHeader header = 1;
  string scrape_request_id = 2; // client request identifier, associated with a scrape request (e.g. a Jacquard request)
  string website_id = 3; // Abbreviation of car-hire provider(broker) company name
  ClientID client_id = 4; // Business which calls vendor-mapping api, obtained from the header of http, including Jacquard and Egressor
  string unmapped_partner_vendor_names = 5; // a comma-seperated string
  string unconfirmed_partner_vendor_names = 6; // a comma-seperated string
  string mapped_with_other_partner_vendor_names = 7; // a comma-seperated string
  commons.DateTime grappler_receive_timestamp = 1998;
}

enum ClientID {
  UNSET_CLIENT_ID = 0;
  CLIENT_ID_JACQUARD = 1; // Jacquard
  CLIENT_ID_EGRESSOR = 2; // Egressor
}

// car hire scheduled job search event
message CarHireScheduledSearch {
    commons.MiniHeader header = 1;
    commons.DateTime grappler_receive_timestamp = 1998;
    commons.Location origin = 2; // carhire pickup location
    commons.Location destination = 3; // carhire dropoff location
    commons.DateTime start_timestamp = 4; // carhire pickup time
    commons.DateTime end_timestamp = 5; // carhire dropoff time
}

// car hire no quote sample results event
message CarHireNoQuoteSample {
    commons.MiniHeader header = 1;
    string provider_id = 2; // request partner
    string market = 3; // request market
    string pick_up_office_id = 4; // request pick up office id
    sint32 real_quote_count = 5; // partner's real quote count from sample result, -1 for not sampled
    bool is_sent_to_partner = 6; // send request to partner or not
    string request_id = 7; //uuid for the request
    commons.DateTime grappler_receive_timestamp = 1998;
}

// Car hire ranking event
message CarHireRanking {
    enum RankingStatus {
        UNSET_RANKING_STATUS = 0;   // Handling exceptions
        RANKED_BY_MODEL = 1;        // ranked by model
        RANKED_BY_FALLBACK = 2;     // ranked by fallback
    }

    commons.MiniHeader header = 1;
    string guid = 2;                         // Unique identifier for the ranking event
    string search_guid = 3;                  // GUID linking this event to the search and card events
    string model_name = 4;                   // Name of the ranking model used (nullable if no model was applied)
    uint32 model_ranked_count = 5;            // Number of top cards ranked by the model
    RankingStatus ranking_status = 6;        // The ranking execution status
    commons.Platform platform = 7;           // Platform of the user
    string grouping_version = 8;             // Version of the grouping logic used during the search
    uint32 request_sequence = 9;              // Request (polling) sequence in a search
    commons.DateTime grappler_receive_timestamp = 1998;
}

// The result of a car hire ranking process
message CarHireRankingResult {
    // Represents an individual ranking result for a card
    message RankingResult {
        string card_id = 1;         // Unique identifier for the card
        float rank_score = 2;       // Ranking score assigned to the card
    }

    commons.MiniHeader header = 1;   // Common header
    string ranking_guid = 2;         // Unique identifier for the ranking event
    string search_guid = 3;          // GUID linking this ranking result to the search event
    repeated RankingResult ranking_results = 4;  // List of individual ranking results for the cards, paginated to avoid exceeding size limits
    uint32 request_sequence = 5;      // Request (polling) sequence number in a search
    string mini_search_guid = 6; // associate to CarHireMiniSearch
    commons.DateTime grappler_receive_timestamp = 1998;
}

// Records all filtering results for car hire searches.
message CarHireFilterResult {
    commons.MiniHeader header = 1;
    string search_guid = 2; // link to one search operation
    string mini_search_guid = 3; // associate to CarHireMiniSearch
    repeated string booking_panel_option_ids = 4; // BPO id list of this card
    CarHireSearchResultsOption filtered_card_detail = 5; // filtered card details
    string card_signature = 6; // concat all card field values
    string filter_search_guid = 7; // link to one filter search operation
    commons.DateTime grappler_receive_timestamp = 1998;
}

// record all paginated results which will be sent as response to frontend
message CarHireResponseQuotes {
    commons.MiniHeader header = 1;
    string search_guid = 2; // link to one search operation
    string mini_search_guid = 3; // associate to CarHireMiniSearch
    uint32 page_index = 4; // page index
    repeated CarHirePageDetails page_details = 5;
    string card_signature = 6; // concat all card field values
    string caps_model_preference = 7; // record which CAPS model this response quote was generated from
    bool is_caps = 8; // Mark whether this response went through CaPS.
    string filter_search_guid = 9; // link to one filter search operation
    commons.DateTime grappler_receive_timestamp = 1998;
}

message CarHirePageDetails {
    string card_id = 1; // card id
    uint32 index_in_page = 2; // card index in page
    repeated CarHireQuoteBrief quote_brief = 3; // quote id and index
}

message CarHireQuoteBrief {
    string booking_panel_option_id = 1; // quote id
    uint32 index_in_card = 2; // sort order of this quote in card
}

// Moved from client to car_hire as it's now needed in car_hire's new design.
// Data must be written to new table (CarHireFilterResult) instead of search_result_option to avoid side effects.
message CarHireSearchResultsOption {
    // The contents of the car hire itinerary that are presented to the user.
    string itinerary_id = 1;

    CarType car_type = 2  [deprecated=true]; // ACRISS car type
    CarCategory car_category = 3  [deprecated=true]; // ACRISS car category
    Transmission transmission = 4  [deprecated=true]; // ACRISS transmission type
    uint32 max_seats = 5; // the maximum seats available to the user
    uint32 max_bags = 6; // the maximum number of bags available to the user
    bool is_air_conditioning = 7; // does the rental have a/c
    uint32 number_of_deals = 8; // how many deals are in the group
    float group_score = 9; // the deal score calculated for the group (visible in app)

    commons.Price price = 10; // represented price of the option
    string sipp_code = 11; // the code that encodes the ACRISS properties of the car in a string
    vehicle.VehicleType vehicle_type = 12;    // vehicle type
    // The category can be both SUV and Small,
    // the maximum size is 2 now and should be limited to few in the future.
    repeated vehicle.VehicleCategory vehicle_categories = 13;
    float best_ranking_score = 14; // the best ranking score for the group, used in Recommended Sort, the higher the better
    Distance distance = 15; // display the distance of the location id
}

message CarHireMcpcQueryEvent {
    commons.LightHeader header = 1;
    string search_guid = 2; // Search/session identifier (join key to searches).
    string quote_guid = 3; // Candidate quote guid (join key to redirects).
    string provider_id = 4; // Stable partner identifier.
    NormalizedDimensions normalized_dimensions = 5; // Normalized dimensions applied.
    commons.Money cpc_value = 6; // Applied CPC value as authored.
    commons.Money cpc_value_gbp = 7; // Applied CPC value converted to GBP.
    string rule_id = 8; // ID of the raw rule row applied.
    string rule_version_ts = 9; // Version timestamp of the raw rule applied.
    string registry_version_ts = 10; // Version timestamp of the raw rule registry metadata applied.
    string mini_search_guid = 11; // Passed from the frontend, generated when a filter or pagination operation occurs.
    DimensionSourceValues dimension_source_values = 12; // Original request values before dimension normalization.

    commons.DateTime grappler_receive_timestamp = 1998;
}

// Original request values from which normalized dimensions are derived.
message DimensionSourceValues {
    string market = 1;              // From request.market (source for "market" dimension).
    string channel = 2;             // From request.channel (source for "device" dimension).
    string pickup_country_id = 3;   // From request.pickup_location.countryId (source for "pickup_market" dimension).
    commons.DateTime pickup_datetime_timestamp = 4;   // From request pickup datetime (source for "length_of_rental" dimension).
    commons.DateTime dropoff_datetime_timestamp = 5;  // From request dropoff datetime (source for "length_of_rental" dimension).
}

message NormalizedDimensions {
    string market = 1; // Normalised source market. Expected to be ISO country code (e.g. UK, US, FR).
    string season = 2; // Normalised season string. Allowed values defined in registry metadata (typically "High" or "Low").
    string device = 3; // Normalised device string. Allowed values defined in registry metadata (typically "Mobile" or "Desktop").
    string rental_duration = 4; // Normalised rental duration string. Allowed values defined in registry metadata (e.g. "Short", "Long").
    string booking_window = 5; // Normalised booking window string. Allowed values defined in registry metadata (e.g. "Short", "Medium", "Long").
    string pickup_market = 6; // Normalised pickup market string. Allowed values defined in registry metadata.
    string length_of_rental = 7; // Normalised length of rental string. Allowed values defined in registry metadata (e.g. "1", "2", ..., "7", "8+").
}

message CarhireChatEvent {
    commons.LightHeader header = 1;
    string utid = 2; //User identifier
    string search_guid = 3; // associate it with search
    string pickup_location_name = 4; // pickup location for the search
    string dropoff_location_name = 5; // dropoff location for the search
    commons.DateTime pickup_datetime_timestamp = 6; // pickup datetime for the search
    commons.DateTime dropoff_datetime_timestamp = 7;// dropoff datetime for the search
    uint32 age = 8; // driver age for the search
    string user_message = 9; // user message sent to the chatbot
    string main_response = 10; // Main response from the chatbot
    string followup_answer = 11; // followup answer generated by the chatbot
    AnswerType intent_detected = 12; // intent detected from the user message
    uint32 sequence_number = 13; // sequence number of messages in the session
    string message_id = 14; // unique identifier for each message
    commons.CultureSettings culture = 15; // culture settings for the search
    commons.DateTime grappler_receive_timestamp = 1998; // Grappler Receive Timestamp added by SDK
}

message CarhireFeedbackEvent {
    commons.LightHeader header = 1;
    string utid = 2;
    string search_guid = 3; // associate it with search
    string message_id = 4; // associate it with mini search
    Feedback feedback_type = 5; // feedback type provided by the user
    commons.DateTime grappler_receive_timestamp = 1998; // Grappler Receive Timestamp added by SDK

}

// Types of answers the chatbot can provide
enum AnswerType {
    // Default unspecified type
    UNSET_ANSWER_TYPE = 0;
    // General car rental knowledge
    ANSWER_TYPE_KNOWLEDGE = 1;
    // Unsupported intent
    ANSWER_TYPE_UNSUPPORTED = 2;
}

// Types of feedback the chatbot can receive
enum Feedback {
    // Default unspecified type
    UNSET_FEEDBACK = 0;
    // Positive feedback
    FEEDBACK_LIKE = 1;
    // Negative feedback
    FEEDBACK_DISLIKE = 2;
}

message MarkerCardEvent {
    commons.MiniHeader header = 1;
    commons.DateTime grappler_receive_timestamp = 1998;

    string search_guid = 2; // associate it with search
    string mini_search_guid = 3; // associate it with mini search
    string location_id = 4; // display location id of loc.pu.key
    repeated uint64 vendor_ids = 5; // Array of vendor IDs
    bool is_airport = 6; // display is airport
    string airport_full_name = 7; // display airport's full_name
    string airport_iata_code = 8; // display airport's iata code
    string non_airport_address = 9; // display non-airport's address
    Distance distance = 10; // display the distance of the location id
    uint64 quote_count = 11; // number of available car hire quotes for this location; currently unused, reserved for future use
    commons.Price price = 12; // display the price
    uint64 group_count = 13; // number of available car hire groups for this location
}
