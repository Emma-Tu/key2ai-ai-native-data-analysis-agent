message CarHireSeoLocationParameter {
    commons.Location pickup_location = 1;
    commons.DateTime pickup_timestamp = 2;
    commons.Location dropoff_location = 3;
    commons.DateTime dropoff_timestamp = 4;
}

enum CarhireSeoAction {
    UNSET_CAR_HIRE_SEO_ACTION = 0;
    CAR_HIRE_SEARCH_CLICKED = 1;
    CAR_HIRE_SEARCH_LOAD = 2;
}

message SeoLoadAction {
  message SearchParameter {
     string country_name = 1; // required when page_type is CAR_HIRE_COUNTRIES
     string provider_name = 2; // required when page_type is CAR_HIRE_PROVIDER
     string airport_name = 3; // required when page_type is CAR_HIRE_AIRPORT
     string location_name = 4; // required when page_type is CAR_HIRE_LOCATION
  }
  SearchParameter search_parameter = 1; 
  CarHireSeoLocationParameter location_parameter = 2; // not required when page_type is one of CAR_HIRE_ALL_xxx, CAR_HIRE_FAQ and CAR_HIRE_PROVIDER
}

message SeoClickAction {
  CarHireSeoLocationParameter location_parameter = 1; // not required when page_type is one of CAR_HIRE_ALL_xxx, CAR_HIRE_FAQ and CAR_HIRE_PROVIDER
}

message CarHireSeoEvent {
    commons.MiniHeader header = 1;
    CarhireSeoAction car_hire_seo_action = 2;
    CarhirePageType carhire_page_type = 3;

    oneof seo_action {
       SeoLoadAction seo_load_action = 4;
       SeoClickAction seo_click_action = 5;
    }

    string search_guid = 6; // associate it with search
    string mini_search_guid = 7; // associate it with mini search

    commons.DateTime grappler_receive_timestamp = 1998;
}

message CarHireNoResults {
    commons.MiniHeader header = 1;
    string search_guid = 2;
    string mini_search_guid = 3; // associate it with mini search
    commons.DateTime grappler_receive_timestamp = 1998;
}

message CarHireMiniSearch {
    commons.MiniHeader header = 1;
    string search_guid = 2;  // associate it with search
    string previous_mini_search_guid = 3; // associate it with previous mini search if exists
    CarHireFilterAndSort car_hire_filter_and_sort = 4; // The state of the filtering and sorting options at the time this event was fired.
    uint32 saved_cars_total_count = 5; // total count of saved cars
    uint32 current_page_hearted_count = 6; // count of saved cars in current page
    uint32 page_index = 7; // current page index start from 0
    uint32 total_results_count = 8; // total results count
    uint32 current_results_count = 9; // current results count
    string filter_search_guid = 10; // associate it with filter search if exists
    commons.DateTime grappler_receive_timestamp = 1998;
}

enum DistanceUnit {
    UNSET_DISTANCE_UNIT = 0; // handling exceptions
    MILES = 1; // miles
    KILOMETERS = 2; // kilometers
    METERS = 3; // meters
}

message Distance {
    double value = 1; // display the distance value
    DistanceUnit unit = 2; // unit to use for distance
}

message CarGroupCardEvent {
    commons.MiniHeader header = 1;
    string search_guid = 2; // associate it with search
    string mini_search_guid = 3; // associate it with mini search
    string search_results_option_guid = 4; // associate clients.BookingPanelOption in bumblebee
    uint32 group_index = 5; // The index number tell you the group position in the page, start from 0
    uint32 page_index = 6; // The index number tell you the group in which page, start from 0
    uint32 initial_group_index = 7; // The index number tell you the initial group position in total results, start from 0
    uint32 number_of_deals = 8; // how many deals are in the group
    UIEventType event_type = 9; // event type maybe RENDERED/VIEWED/PRESSED
    uint32 max_seats = 10; // the maximum seats available to the user
    uint32 max_bags = 11; // the maximum number of bags available to the user
    uint32 max_score = 12 [deprecated=true]; // car group overall score assigned by the api, this one replaced by group_score
    string booking_panel_option_guid = 13;  // unique guid attached to deep link of quote
    PickupMethod pickup_method = 14;// This item tells us the quote pickup method
    PickupType pickup_type = 15;// This item tells us the quote pickup type
    bool is_pickup_at_airport = 16; //  The pickup location type whether it is an airport or not
    float group_score = 17; // The group score which is calculated by quotes at frontend
    string itinerary_id = 18; // The contents of the car hire itinerary that are presented to the user.
    uint32 recommended_ranking_index = 19; // The index number tell you the recommended position in total results, start from 0
    uint32 total_number_of_deals = 20; // total deals count in the group
    GroupCardType card_type = 21; // group card type
    string car_type = 22; // car type
    string car_name = 23;
    string vendor_id = 24;
    Transmission transmission = 25;
    bool has_ac = 26;
    string seat_group = 27; // seat group values: 1-3, 4-5, 6+
    string pickup_location = 28;
    string save_action_id = 29; // the id of save action
    commons.Price price = 30; // price on group card
    bool is_hero_cheapest = 31; // Is the hero quote cheapest in the group.
    Distance distance = 32; // display the distance of the location id

    commons.DateTime grappler_receive_timestamp = 1998;
}

// Component in Search Control
enum SearchControlItem {
    UNSET_SEARCH_CONTROL_ITEM = 0;
    PICKUP_LOCATION_INPUT = 1;
    DROPOFF_LOCATION_INPUT = 2;
    RETURN_CHECKBOX = 3;
    PICKUP_DATE_SELECTED = 4;
    PICKUP_TIME_SELECTED = 5;
    DROPOFF_DATE_SELECTED = 6;
    DROPOFF_TIME_SELECTED = 7;
    AGE_CHECKBOX = 8;
    AGE_SELECTED = 9;
    SEARCH_BUTTON = 10;
}

message CarHireSearchControlChanged {
    commons.MiniHeader header = 1;
    string search_guid = 2;  // associate to clients.Search
    string mini_search_guid = 3; // associate to CarHireMiniSearch
    SearchControlItem item = 4; // component type in search control
    oneof value {
        commons.Location location = 5; // pickup/dropoff location
        commons.Date date = 6; // pickup/dropoff date
        commons.Time time = 7; // pickup/dropoff time
        bool is_checked = 8; // checkbox status in search control
        uint32 driver_age = 9; // driver age in search control
    }
    commons.DateTime grappler_receive_timestamp = 1998;
}

enum AutosuggestGroupType {
    UNSET_AUTOSUGGEST_GROUP_TYPE = 0;
    AUTOSUGGEST_GROUP = 1; // group type of autosuggest
    RECENT_SEARCH_GROUP = 2; // group type of recent search
    MOST_POPULAR_GROUP = 3; // group type of most popular
}

// the entity type used in carhire autosuggest
enum LocationType {
    UNSET_LOCATION_TYPE = 0;
    CITY = 1;
    AIRPORT = 2;
    TRAIN_STATION = 3;
    DISTRICT = 4;
}

message CarHireAutosuggestItemAction {
    commons.MiniHeader header = 1;
    string search_guid = 2; // associate it with clients.search
    string mini_search_guid = 3; // associate it with CarHireMiniSearch
    string entity_id = 4; // autosuggest entity id eg. 95565047
    LocationType entity_type = 5; // autosuggest entity type eg. City/Airport
    string entity_value = 6; // autosuggest entity valye eg. London
    AutosuggestGroupType group_type = 7; // autosuggest group type
    uint32 position = 8; // autosuggest item position in the group list
    string query_string = 9; // autosuggest input query string
    UIEventType event_type = 10; // autosuggest item event type, eg. RENDERED/VIEWED/SELECTED
