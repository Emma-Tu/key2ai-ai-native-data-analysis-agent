// Schema for generating events for carHire indicative price

syntax = "proto3";
package car_hire_indicative_price;
option go_package = "github.com/skyscanner/go-schemas/car_hire_indicative_price";
option java_package = "net.skyscanner.schemas";
option objc_class_prefix = "SKYSchemaCarHireIndicativePrice";
import "commons.proto";
import "unified_search_service.proto";

message CarHireIndicativePriceSearchEvent {
    commons.LightHeader header = 1;
    string search_request_id = 2; //uuid for the request
    TravellerContext traveller_context = 3;
    TrafficSource traffic_source = 4;
    repeated Location locations = 5; // The locations where the car is picked up and dropped off
    string start_date = 6; // The date the user's query start date yyyy-MM-dd
    string end_date = 7; // The date the user's query end date yyyy-MM-dd
    unified_search_service.GeoLevel target_geo_level = 8;
    DateTimeGroupingType date_time_grouping_type = 9;
    Filter filter = 10; // The filter applied to the search
    Scenario scenario = 11; // The scenarios that the user search
    uint32 result_count = 12; // The number of indicative price results
    repeated IndicativePriceResult indicative_price_results = 13; // The indicative price detail results
    LocationType location_type = 14; // The query's location type
    commons.DateTime grappler_receive_timestamp = 1998;
}

message TravellerContext {
    string market = 1;  // Name of the country user has selected or Skyscanner domain being used. eg.UK
    string locale = 2;  // Four letter locale code used to set the language. eg. en-GB
    string currency = 3;  // Three letter currency code. eg.GBP
}

enum TrafficSource {
    UNSET_TRAFFIC_SOURCE = 0;
    SEO = 1; // The SEO business
    XSELL = 2; // The XSELL business
    COMBINE_SEARCH= 3; // The COMBINE_SEARCH business
    B2B = 4; // The B2B business
}

enum DateTimeGroupingType {
    UNSET_DATE_TIME_GROUPING_TYPE = 0; // The date grouping is not specified (use the default).
    DATE_TIME_GROUPING_TYPE_BY_DATE = 1; // Group the quotes by day.
    DATE_TIME_GROUPING_TYPE_BY_MONTH = 2; // Group the quotes by month.
    DATE_TIME_GROUPING_TYPE_BY_WEEK = 3; // Group the quotes by week.
}

message Filter {
    FilterConstraint filter_constraint = 1; // The filter constraint
    string car_types = 2;  // car type,Separate multiple with commas
    string supplier_ids = 3;  // supplier id，Separate multiple with commas
    string partner_ids = 4; // partner id，Separate multiple with commas
}

  enum FilterConstraint {
    UNSET_FILTER_CONSTRAINT = 0;
    FILTER_CONSTRAINT_EQUALS_TO = 1;
    FILTER_CONSTRAINT_NOT_EQUALS_TO = 2;
  }

enum Scenario {
    UNSET_SCENARIO = 0; // Default value, scenario is not set
    SEO_HOME_PAGE = 1; // Scenario for SEO home page
    SEO_CITY = 2; // Scenario for SEO city
    SEO_AIRPORT = 3; // Scenario for SEO airport
    SEO_COUNTRY = 4; // Scenario for SEO country
    SEO_PROVIDER_IN_CITY = 5; // Scenario for SEO provider in city
    SEO_PROVIDER_IN_AIRPORT = 6; // Scenario for SEO provider in airport
    SEO_CAR_TYPE = 7; // Scenario for SEO car type
    SEO_PROVIDER = 8; // Scenario for SEO provider
    SEO_NEIGHBOURHOOD = 9; // Scenario for SEO neighbourhood
    SEO_PROVIDER_IN_COUNTRY = 10; // Scenario for SEO provider in country
    SEO_TRAIN_STATION = 11; // Scenario for SEO train station
    SEO_REGION = 12; // Scenario for SEO region
    SEO_ONE_WAY = 13; // Scenario for SEO one way
    SEO_PARTNER = 14; // Scenario for SEO partner
    XSELL_DAY_VIEW = 15; // Scenario for XSELL day view
    XSELL_BOOKING_PANEL = 16; // Scenario for XSELL booking panel
    XSELL_MONTH_VIEW = 17; // Scenario for XSELL month view
    COMBINE_SEARCH_BUSINESS = 18; // Scenario for combine search
    B2B_BUSINESS = 19; // Scenario for b2b
    PAM = 20; // Scenario for PAM
    SEO_HOTEL_DESTINATION = 21; // Scenario for SEO hotel destination
    SEO_CAR_TYPE_IN_CITY = 22; // Scenario for SEO car type in city
    INVALID = 99; // Invalid scenario
}

message IndicativePriceResult {
    string pickup_date = 1;  // The pickup date in the actual indicative price data yyyy-MM-dd
    string dropoff_date = 2;  // The dropoff date in the actual indicative price data yyyy-MM-dd
    double indicative_price = 3;  // The indicative price
    Location location = 4;  // The location where the car is picked up and dropped off
}

message Location {
    string pickup_location = 1; // The location entity id where the car is picked up
    string dropoff_location = 2; // The location entity id where the car is dropped off
}

enum LocationType {
    UNSET_LOCATION_TYPE = 0; // Default value, location type is not set
    LOCATION_TYPE_ANYWHERE = 1; // The location type is anywhere
    LOCATION_TYPE_COUNTRY = 2; // The location type is country
    LOCATION_TYPE_TERRITORY = 3; // The location type is territory;
    LOCATION_TYPE_REGION_FIRST_ADM = 4; // The location type is first administrative region
    LOCATION_TYPE_REGION_SECOND_ADM = 5; // The location type is second administrative region
    LOCATION_TYPE_REGION_THIRD_ADM = 6; // The location type is third administrative region
    LOCATION_TYPE_AIRPORT = 7; // The location type is airport
    LOCATION_TYPE_CITY = 8; // The location type is city
    LOCATION_TYPE_DISTRICT = 9; // The location type is anywhere
    LOCATION_TYPE_TRAIN_STATION = 10; // The location type is train station
}

