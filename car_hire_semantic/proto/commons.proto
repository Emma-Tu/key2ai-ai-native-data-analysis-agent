// Owner: Ziggy (Slack: #data-platform-support)
// Common schema/types re-used across all mini events or events emitted to slipstream ex: header. 

syntax = "proto3";

package commons;
option go_package = "github.com/skyscanner/go-schemas/commons";

option java_package = "net.skyscanner.schemas";
option objc_class_prefix = "SKYSchema";

import "google/protobuf/descriptor.proto";

// EXTENSIONS

extend google.protobuf.FieldOptions {
  string anonymisation_method = 50001 [deprecated = true];
}

// DATA TYPES

// Represents day of year without time
message Date {
  int32 year = 1;
  int32 month = 2;
  int32 day = 3;
}

message DateTime {
  // The following fields should be interpreted as:
  // local_time_millis = unix_time_millis + timezone_offset_mins * 60000 + daylight_savings_offset_mins * 60000
  int64 unix_time_millis = 1; // UNIX timestamp in MILLIS
  int32 timezone_offset_mins = 2; // Timezone offset from UTC in minutes, For example UK = 0, NL = 60. Does not include any adjustment for daylight savings.
  int32 daylight_savings_offset_mins = 3; // A countries daylight savings offset in minutes. Set only when a country observes daylights saving time. For Example: UK = 60, NL = 60
  enum Precision {
    //Precision enables us to specify open dates like months, years or seconds
    MILLI = 0;
    SECOND = 1;
    DAY = 2;
    WEEK = 4;
    MONTH = 5;
    YEAR = 6;
    ANYTIME = 7; //Anytime is unspecified time
    MINUTE = 8;
  }
  Precision date_time_kind = 4;
}

// Represents a time of day, independent of any particular day
message Time {
  uint32 milliseconds = 1;
  uint32 seconds = 2;
  uint32 minutes = 3;
  uint32 hours = 4;
  int32 timezone_offset_mins = 5; // Timezone offset from UTC in minutes, For example UK = 0, NL = 60
  int32 daylight_savings_offset_mins = 6; // A countries daylight savings offset in minutes. Set only when a country observes daylights saving time. For Example: UK = 60, NL = 60
}

message TimeInterval {
  int64 interval = 1; // Time interval value. The precision is defined by the time_interval_kind field.
  enum TimeIntervalKind {
    MILLI = 0;
    SECOND = 1;
    DAY = 2;
    WEEK = 3;
    MONTH = 4;
    YEAR = 5;
    HOUR = 6;
    MINUTE = 7;
  }
  TimeIntervalKind time_interval_kind = 2; // Defines the precision of how elapsed time are measured (seconds, minutes)
}

message Money {
  //Currency currency_obsolete = 1;
  string currency = 1;
  int64 amount = 2;
  enum Unit {
    CENTI = 0; //The cent
    MILLI = 1;
    MICRO = 2;
    WHOLE = 3; //A whole pound, euro, etc.
    UNSPECIFIED = 4;
  }
  Unit unit = 3;
}

message Price {
  Money total_price = 1; // Total price of a booking
  Money tax = 2; // Sum of all taxes applied to the booking
  Money payment_card_fees = 3; // Sum of all payment card fees applied to the booking
  Money insurance = 4; // Any insurance charges applied to the booking
}

// Stores granular tax item information
message TaxItem {
  Money amount = 1; // The tax value amount and currency
  string tax_code = 2; // The tax code, usually 2 letter abbreviation e.g "L7", "UP"
  string description = 3; // description of what the tax item is e.g Air passenger duty
}

// Accurately represents floating point numbers using integers with applied precision
// See an example with a similar pattern in the GeoMeasurement message
message DisplayMeasurement {
  int32 amount = 1;
  int32 precision = 2;
}

// Stores Lat Long values as integers with applied precision
// Example: Latitude of Barcelona, Spain is 41.385064, encoded as "amount=41385064 precision=6"
message GeoMeasurement {
  sint64 amount = 1;
  int32 precision = 2;
}

