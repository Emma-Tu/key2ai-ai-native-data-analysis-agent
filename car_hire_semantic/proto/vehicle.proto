    FULLSIZE_COUPE = 14;
    FULLSIZE_ESTATE = 15;
    FULLSIZE_LIMOUSINE = 16;
    FULLSIZE_MOTOR_HOME = 17;
    FULLSIZE_MOTORCYCLE = 18;
    FULLSIZE_PASSENGER_VAN = 19;
    FULLSIZE_PICK_UP_TRUCK = 20;
    FULLSIZE_SPORTS_CAR = 21;
    FULLSIZE_SUV = 22;
