<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分析报告 · Car Hire</title>
<style>
  :root{
    --bg:#0b1020; --panel:#141d33; --panel-2:#0f1728; --line:#233052; --line-soft:#1b2540;
    --text:#e8eefc; --muted:#8fa0c4; --faint:#5f6f92; --brand:#2ec5ff; --brand-2:#1d8fe0; --brand-ink:#04121f;
    --green:#37d39b; --amber:#ffcf6b; --violet:#b78cff;
    --viz-surface:#141d33; --viz-ink:#e8eefc; --viz-ink2:#c3c2b7; --viz-muted:#898781;
    --seq-3:#3987e5;
    --cat-1:#3987e5; --cat-2:#199e70; --cat-3:#c98500; --cat-4:#008300; --cat-5:#9085e9; --cat-6:#e66767; --cat-7:#d55181; --cat-8:#d95926;
    --mono:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 80% -10%,rgba(46,197,255,.10),transparent 60%),var(--bg);
    color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.55}
  .wrap{max-width:1120px;margin:0 auto;padding:36px 40px 80px}
  .top{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--brand),var(--brand-2));display:grid;place-items:center;color:var(--brand-ink);font-weight:800;font-size:18px}
  h1{font-size:22px;margin:0;font-weight:750}
  .q{color:var(--muted);font-size:15px;margin:10px 0 2px}
  .meta{color:var(--faint);font-size:12px;margin-bottom:22px;display:flex;gap:14px;flex-wrap:wrap}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:12px 16px;min-width:130px}
  .stat .k{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.5px}
  .stat .v{font-size:22px;font-weight:750;margin-top:3px;font-variant-numeric:tabular-nums}
  .kpirow{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:26px}
  .sec{margin-bottom:26px}
  .sec h2{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin:0 0 12px;display:flex;align-items:center;gap:8px}
  .sec h2 .dot{width:7px;height:7px;border-radius:50%;background:var(--brand)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 20px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:900px){.two{grid-template-columns:1fr}}
  pre.sql{background:#070c17;border:1px solid var(--line);border-radius:10px;padding:14px;font-family:var(--mono);font-size:12px;color:#c7d3ee;overflow:auto;white-space:pre-wrap;word-break:break-word;margin:0}
  .loading{display:flex;gap:11px;align-items:center;color:var(--muted);padding:50px;justify-content:center}
  .spin{width:20px;height:20px;border:2.5px solid var(--line);border-top-color:var(--brand);border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .err{background:rgba(255,143,179,.12);border:1px solid rgba(255,143,179,.3);color:#ff8fb3;border-radius:9px;padding:14px 16px}
  .back{color:var(--brand);text-decoration:none;font-size:12.5px;margin-left:auto}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><div class="logo">C</div><h1>分析报告</h1><a class="back" href="/">← 返回操作台</a></div>
  <div id="root"><div class="loading"><div class="spin"></div>加载报告…</div></div>
</div>
<script src="/charts.js"></script>
<script>
const $=s=>document.querySelector(s);
const params=new URLSearchParams(location.search);
const id=params.get('id');

async function load(){
  if(!id){$('#root').innerHTML='<div class="err">缺少报告 id</div>';return;}
  let rep;
  try{rep=await (await fetch('/api/report?id='+encodeURIComponent(id))).json();}
  catch(e){$('#root').innerHTML='<div class="err">加载失败：'+esc(e.message)+'</div>';return;}
  if(rep.error){$('#root').innerHTML='<div class="err">'+esc(rep.error)+'</div>';return;}
  render(rep);
}

function render(rep){
  const d=rep.result||{};
  const cols=(d.data&&d.data.columns)||[], rows=(d.data&&d.data.rows)||[];
  const {dims,meas,skip}=classify(cols,rows);
  const form=pickForm(dims,meas,rows,skip);
  let h='';
  // question + meta
  if(rep.question)h+=`<div class="q">问题：${esc(rep.question)}</div>`;
  h+=`<div class="meta"><span>✅ ${d.row_count||rows.length} 行</span><span>⏱ ${d.execution_time_ms||0}ms</span><span>方言 databricks</span><span>自动识别：${esc(form)}</span></div>`;

  if(!rows.length){h+='<div class="err">查询无结果行（可能该分区无数据或超时）。</div>';$('#root').innerHTML=h;return;}

  // KPI summary: row count + stats for each numeric measure
  h+='<div class="kpirow"><div class="stat"><div class="k">结果行数</div><div class="v" style="color:var(--brand)">'+(d.row_count||rows.length)+'</div></div>';
  meas.slice(0,4).forEach(m=>{const s=stats(rows,m);if(s)h+=`<div class="stat"><div class="k">${esc(m.name)} · 合计</div><div class="v" style="color:var(--green)">${fmt(s.sum)}</div></div>`;});
  h+='</div>';

  // primary chart
  h+='<div class="sec"><h2><span class="dot"></span>主图（'+esc(form)+'）</h2><div class="card">'+buildChart(form,cols,rows,dims,meas)+'</div></div>';

  // secondary view: for a single dim + single measure, also show composition (pie) + a stats detail
  if(form==='bar'&&dims.filter(x=>x.role==='cat').length>=1&&meas.length===1){
    h+='<div class="two"><div class="sec"><h2><span class="dot" style="background:var(--cat-2)"></span>占比构成</h2><div class="card">'+buildChart('pie',cols,rows,dims,meas)+'</div></div>';
    const m=meas[0],s=stats(rows,m);
    h+='<div class="sec"><h2><span class="dot" style="background:var(--violet)"></span>'+esc(m.name)+' 分布统计</h2><div class="card">'+
      (s?`<div class="kpirow" style="margin:0"><div class="stat"><div class="k">合计</div><div class="v">${fmt(s.sum)}</div></div><div class="stat"><div class="k">均值</div><div class="v">${fmt(s.avg)}</div></div><div class="stat"><div class="k">最大</div><div class="v">${fmt(s.max)}</div></div><div class="stat"><div class="k">最小</div><div class="v">${fmt(s.min)}</div></div></div>`:'—')
      +'</div></div></div>';
  }

  // full data table
  h+='<div class="sec"><h2><span class="dot" style="background:var(--faint)"></span>明细数据（'+rows.length+' 行）</h2>'+dataTable(cols,rows)+'</div>';

  // SQL
  h+='<div class="sec"><h2><span class="dot" style="background:var(--amber)"></span>查询 SQL</h2><pre class="sql">'+esc(rep.sql||'')+'</pre></div>';

  $('#root').innerHTML=h;
}
load();
</script>
</body>
</html>
