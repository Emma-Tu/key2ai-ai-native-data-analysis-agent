<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分析报告 · Car Hire</title>
<style>
  :root{
    --bg:#080b16; --panel:#121a2e; --panel-2:#0d1424; --line:#26324f; --line-soft:#1a2338;
    --text:#eef3ff; --muted:#93a3c6; --faint:#61729a; --brand:#37c7ff; --brand-2:#1d8fe0; --brand-ink:#04121f;
    --green:#37d39b; --amber:#ffcf6b; --violet:#b78cff; --pink:#ff8fb3; --red:#ff6b6b;
    --viz-surface:#121a2e; --viz-ink:#eef3ff; --viz-ink2:#c6cfe6; --viz-muted:#8b97b5;
    --seq-3:#3987e5;
    --cat-1:#3987e5; --cat-2:#199e70; --cat-3:#c98500; --cat-4:#008300; --cat-5:#9085e9; --cat-6:#e66767; --cat-7:#d55181; --cat-8:#d95926;
    --mono:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.65;-webkit-font-smoothing:antialiased}
  ::selection{background:rgba(55,199,255,.3)}
  .page{max-width:1080px;margin:0 auto;padding:0 40px 100px}

  /* ---------- cover ---------- */
  .cover{position:relative;overflow:hidden;padding:56px 0 46px;
    background:radial-gradient(900px 400px at 15% 0%,rgba(55,199,255,.18),transparent 60%),
               radial-gradient(700px 400px at 90% 20%,rgba(144,133,233,.16),transparent 55%),
               linear-gradient(180deg,#0f1a30,#080b16);
    border-bottom:1px solid var(--line-soft)}
  .cover:after{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.028) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.028) 1px,transparent 1px);background-size:34px 34px;mask-image:radial-gradient(700px 400px at 30% 10%,#000,transparent 70%);pointer-events:none}
  .cover-in{max-width:1080px;margin:0 auto;padding:0 40px;position:relative;z-index:1}
  .topbar{display:flex;align-items:center;gap:12px;margin-bottom:30px}
  .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--brand),var(--brand-2));display:grid;place-items:center;color:var(--brand-ink);font-weight:800;font-size:19px;box-shadow:0 8px 22px rgba(55,199,255,.4)}
  .topbar .name{font-weight:700;font-size:14px}.topbar .name small{display:block;color:var(--faint);font-size:11px;font-weight:500}
  .langtoggle{margin-left:auto;display:flex;gap:3px;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:100px;padding:3px}
  .langtoggle button{background:none;border:none;color:var(--muted);font-size:12px;font-weight:600;padding:5px 12px;border-radius:100px;cursor:pointer;transition:.15s}
  .langtoggle button.active{background:var(--brand);color:var(--brand-ink)}
  .back{margin-left:12px;color:var(--brand);text-decoration:none;font-size:12.5px;padding:8px 15px;border:1px solid var(--line);border-radius:100px;transition:.15s}
  .back:hover{background:rgba(55,199,255,.1)}
  .eyebrow{color:var(--brand);font-size:11.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
  .qtitle{font-size:34px;font-weight:800;margin:0 0 8px;letter-spacing:.2px;line-height:1.25;max-width:800px}
  .lede{font-size:15px;color:var(--muted);max-width:720px;margin:14px 0 22px}
  .lede b{color:var(--text)}
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:100px;padding:5px 13px;font-size:12px;color:var(--muted)}
  .chip b{color:var(--text)}.chip .d{width:6px;height:6px;border-radius:50%}

  .page{padding-top:34px}
  .reveal{opacity:0;transform:translateY(18px);transition:opacity .6s ease,transform .6s cubic-bezier(.2,.7,.2,1)}
  .reveal.in{opacity:1;transform:none}

  /* ---------- section ---------- */
  .sec{margin-bottom:38px}
  .sechead{display:flex;align-items:baseline;gap:11px;margin:0 0 16px}
  .secno{font-family:var(--mono);color:var(--brand);font-size:12px;font-weight:700;background:rgba(55,199,255,.12);padding:3px 8px;border-radius:6px}
  .sectitle{font-size:17px;font-weight:750;letter-spacing:.2px}
  .secsub{color:var(--faint);font-size:12px;margin-left:auto}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:18px;padding:24px 26px;box-shadow:0 14px 50px rgba(0,0,0,.4)}

  /* ---------- executive summary ---------- */
  .insights{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:820px){.insights{grid-template-columns:1fr}}
  .insight{display:flex;gap:14px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
  .insight .ic{width:38px;height:38px;border-radius:10px;flex:none;display:grid;place-items:center;font-size:19px;background:rgba(55,199,255,.12)}
  .insight .tx{font-size:13.5px;color:var(--muted)}
  .insight .tx b{color:var(--text)}
  .hl{color:var(--brand);font-weight:750;font-variant-numeric:tabular-nums}
  .hl-g{color:var(--green);font-weight:750}.hl-v{color:var(--violet);font-weight:750}.hl-a{color:var(--amber);font-weight:750}

  /* ---------- KPI ---------- */
  .kpirow{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:8px}
  .kpi{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:16px;padding:18px 20px;position:relative;overflow:hidden}
  .kpi:before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent,var(--brand))}
  .kpi .k{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.6px;margin-bottom:9px}
  .kpi .v{font-size:30px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
  .kpi .sub{font-size:11px;color:var(--faint);margin-top:7px}

  /* ---------- animated bar (HTML) ---------- */
  .bars{display:flex;flex-direction:column;gap:9px}
  .bar-row{display:grid;grid-template-columns:64px 1fr auto;gap:12px;align-items:center}
  .bar-row .lbl{font-size:12.5px;color:var(--viz-ink2);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar-track{background:var(--panel-2);border-radius:7px;height:22px;position:relative;overflow:hidden}
  .bar-fill{height:100%;border-radius:7px;width:0;background:linear-gradient(90deg,#2a6fc7,#3987e5);transition:width 1s cubic-bezier(.2,.7,.2,1)}
  .bar-row.top .bar-fill{background:linear-gradient(90deg,#1d8fe0,#37c7ff);box-shadow:0 0 16px rgba(55,199,255,.5)}
  .bar-row .val{font-size:12px;font-variant-numeric:tabular-nums;color:var(--text);white-space:nowrap}
  .bar-row.top .val{color:var(--brand);font-weight:700}
  .badge{font-size:9.5px;background:rgba(55,199,255,.18);color:var(--brand);padding:1px 6px;border-radius:5px;margin-left:6px;font-weight:700}

  /* ---------- donut ---------- */
  .donut-wrap{display:flex;gap:26px;align-items:center;flex-wrap:wrap}
  .donut{position:relative;width:220px;height:220px;flex:none}
  .donut svg{transform-origin:110px 110px}
  .sec.in .donut svg{animation:donutIn .9s cubic-bezier(.2,.7,.2,1) both}
  @keyframes donutIn{from{opacity:0;transform:rotate(-16deg) scale(.82)}to{opacity:1;transform:none}}
  .donut .center{position:absolute;inset:0;display:grid;place-content:center;text-align:center}
  .donut .center .cv{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums}
  .donut .center .cl{font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.6px}
  .seg{transition:stroke-dashoffset 1.1s cubic-bezier(.2,.7,.2,1)}
  .legend{flex:1;min-width:210px}
  .legend .lg{display:flex;align-items:center;gap:9px;padding:5px 0;font-size:12.5px;border-bottom:1px solid var(--line-soft)}
  .legend .sw{width:11px;height:11px;border-radius:3px;flex:none}
  .legend .lv{margin-left:auto;font-variant-numeric:tabular-nums;color:var(--muted)}
  .legend .lp{color:var(--faint);width:44px;text-align:right;font-variant-numeric:tabular-nums}

  .statgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  @media(max-width:600px){.statgrid{grid-template-columns:1fr 1fr}}
  .ministat{background:var(--panel-2);border:1px solid var(--line-soft);border-radius:12px;padding:13px 15px}
  .ministat .k{font-size:10.5px;color:var(--faint);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
  .ministat .v{font-size:18px;font-weight:750;font-variant-numeric:tabular-nums}

  .two{display:grid;grid-template-columns:1.1fr .9fr;gap:18px;align-items:start}
  @media(max-width:880px){.two{grid-template-columns:1fr}}

  /* ---------- conclusion ---------- */
  .concl{background:linear-gradient(135deg,rgba(55,199,255,.08),rgba(144,133,233,.06));border:1px solid var(--line);border-radius:18px;padding:24px 26px}
  .concl ul{margin:10px 0 0;padding-left:0;list-style:none}
  .concl li{display:flex;gap:11px;padding:8px 0;font-size:13.5px;color:var(--muted);border-bottom:1px solid var(--line-soft)}
  .concl li:last-child{border:none}
  .concl li .n{flex:none;width:22px;height:22px;border-radius:50%;background:rgba(55,199,255,.15);color:var(--brand);display:grid;place-items:center;font-size:11px;font-weight:700}
  .concl li b{color:var(--text)}
  .caveat{margin-top:14px;padding:12px 15px;border-left:3px solid var(--amber);background:rgba(255,207,107,.07);border-radius:0 10px 10px 0;font-size:12px;color:var(--muted)}

  .tablewrap{overflow:auto;border:1px solid var(--line);border-radius:14px;max-height:520px}
  table.dt{border-collapse:collapse;width:100%}
  table.dt th{text-align:left;padding:10px 15px;border-bottom:2px solid var(--line);color:var(--muted);font-size:11.5px;white-space:nowrap;position:sticky;top:0;background:var(--panel)}
  table.dt td{padding:8px 15px;border-bottom:1px solid var(--line-soft);font-family:var(--mono);font-size:12px;white-space:nowrap;font-variant-numeric:tabular-nums}
  table.dt tr:hover td{background:rgba(255,255,255,.03)}
  pre.sql{background:#060a13;border:1px solid var(--line);border-radius:12px;padding:16px 18px;font-family:var(--mono);font-size:12px;color:#c7d3ee;overflow:auto;white-space:pre-wrap;word-break:break-word;margin:0;line-height:1.65}

  .loading{display:flex;gap:11px;align-items:center;color:var(--muted);padding:70px;justify-content:center}
  .spin{width:20px;height:20px;border:2.5px solid var(--line);border-top-color:var(--brand);border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .err{background:rgba(255,143,179,.12);border:1px solid rgba(255,143,179,.3);color:var(--pink);border-radius:12px;padding:16px 18px}
  .foot{color:var(--faint);font-size:11.5px;text-align:center;margin-top:46px;padding-top:22px;border-top:1px solid var(--line-soft)}
</style>
</head>
<body>
<div id="root"><div class="loading"><div class="spin"></div>加载报告…</div></div>
<script src="/charts.js"></script>
<script>
const $=s=>document.querySelector(s);
const id=new URLSearchParams(location.search).get('id');
const CATV=['--cat-1','--cat-2','--cat-3','--cat-4','--cat-5','--cat-6','--cat-7','--cat-8'];
function caveatBits(sql,lang){
  sql=(sql||'').toLowerCase();let s='';
  const cnt=lang==='en'?'metric is event count COUNT(*) (not distinct); ':'指标为事件计数 COUNT(*)（非去重）；';
  const day=(dt)=>lang==='en'?`sample is a single-day partition ${dt}; `:`样本为单日分区 ${dt}；`;
  if(/count\(\s*\*\s*\)/.test(sql))s+=cnt;
  const m=sql.match(/dt\s*=\s*'([^']+)'/);if(m)s+=day(m[1]);
  return s;
}
const DICT={
  zh:{eyebrow:'分析报告 · Analysis Report', back:'← 返回操作台', unit_rows:'行', view:'视图', cat:'类别', badge:'领跑',
    noresult:'查询无结果行（该分区无数据或超时）。', autogen:'由数据自动生成', autoform:'自动按数据结构选型', sqlsub:'只读 · Databricks',
    fl:{kpi:'关键指标',bar:'排名对比',pie:'占比构成',line:'时间趋势',smallmult:'多指标对比',multiline:'多指标趋势',table:'明细表'},
    sec:{summary:'执行摘要',kpi:'关键指标',overview:'概览',comp:'占比构成',dist:'分布',concl:'结论与建议',detail:'明细数据',sql:'查询 SQL'},
    k:{rows:'结果行数',cols:'列',total:'合计',avg:'均值',peak:'峰值',median:'中位数',max:'最大',min:'最小',top1:'Top1 占比'},
    ic:{leader:'领跑者',conc:'头部集中度',tail:'长尾',scale:'整体规模'}, conc:{hi:'高度集中',mid:'中度集中',lo:'相对分散'},
    foot:'Car Hire Semantic Layer · AI-Native Data Analysis · 报告由查询结果自动生成',
    lede:(A,dn,mn)=>`共 <b>${A.n}</b> 个${dn}，${mn} 合计 <b>${fmt(A.total)}</b>。<b>${esc(A.leader.k)}</b> 以 <b>${pct(A.leaderShare)}%</b> 领跑，前三名合计占 <b>${pct(A.top3Share)}%</b>。`,
    ledeNo:'本报告基于 Databricks 实时查询结果自动生成。',
    insLeader:(A,mn)=>`领跑者 <b>${esc(A.leader.k)}</b>：${mn} 达 <span class="hl">${fmt(A.leader.v)}</span>，占总量 <span class="hl">${pct(A.leaderShare)}%</span>${A.ratio?`，是第二名 <b>${esc(A.second.k)}</b> 的 <span class="hl">${A.ratio.toFixed(1)}×</span>`:''}。`,
    insConc:(A,cl)=>`头部集中度<b>${cl}</b>：前三名（${esc(A.arr.slice(0,3).map(x=>x.k).join(' / '))}）合计占 <span class="hl-g">${pct(A.top3Share)}%</span>。`,
    insTail:(A,dn)=>`长尾：其余 <span class="hl-v">${A.tailN}</span> 个${dn}合计仅占 <span class="hl-v">${pct(A.tailShare)}%</span>，呈明显头部效应。`,
    insScale:(A,dn,mn)=>`整体规模：${A.n} 个${dn}，${mn} 合计 <span class="hl-a">${fmt(A.total)}</span>，均值 <span class="hl-a">${fmt(A.total/A.n)}</span>。`,
    sortBy:(mn,dn)=>`${mn} 按${dn}排序（高亮为领跑者）`, top20:(n)=>`仅显示前 20（共 ${n}）`,
    c1:(A)=>`<b>${esc(A.leader.k)} 是绝对核心</b>，单一贡献 ${pct(A.leaderShare)}%${A.ratio&&A.ratio>1.5?`，与第二名拉开 ${A.ratio.toFixed(1)} 倍差距`:''}，资源与运营应优先保障。`,
    c2:(A)=>`头部前三占 <b>${pct(A.top3Share)}%</b>，${A.top3Share>0.5?'集中度高、抗风险能力弱，需关注头部波动':'分布较均衡，增长机会分散'}。`,
    c3:(A,dn)=>`长尾 ${A.tailN} 个${dn}合计仅 <b>${pct(A.tailShare)}%</b>，可评估高潜力项的投入产出或做精简。`,
    cNo:(n)=>`本次为 <b>${n}</b> 行明细/聚合数据，建议改用带 <b>GROUP BY</b> 的聚合查询以获得可视化洞察。`,
    caveat:(sql)=>`口径说明：${caveatBits(sql,'zh')}数据来自 Databricks <b>prod_trusted</b>（经 dev 工作区读取）；数字由查询结果实时计算，非缓存。`,
  },
  en:{eyebrow:'Analysis Report', back:'← Back to console', unit_rows:'rows', view:'View', cat:'categories', badge:'Leader',
    noresult:'No result rows (no data in that partition, or timed out).', autogen:'auto-generated from data', autoform:'auto-selected by data shape', sqlsub:'read-only · Databricks',
    fl:{kpi:'Key metrics',bar:'Ranking',pie:'Composition',line:'Trend',smallmult:'Multi-measure',multiline:'Multi-line trend',table:'Detail'},
    sec:{summary:'Executive summary',kpi:'Key metrics',overview:'Overview',comp:'Composition',dist:'Distribution',concl:'Conclusions & recommendations',detail:'Detail data',sql:'Query SQL'},
    k:{rows:'Rows',cols:'cols',total:'total',avg:'avg',peak:'peak',median:'median',max:'max',min:'min',top1:'Top-1 share'},
    ic:{leader:'Leader',conc:'Concentration',tail:'Long tail',scale:'Scale'}, conc:{hi:'highly concentrated',mid:'moderately concentrated',lo:'fairly dispersed'},
    foot:'Car Hire Semantic Layer · AI-Native Data Analysis · report auto-generated from query results',
    lede:(A,dn,mn)=>`Across <b>${A.n}</b> ${dn}, ${mn} totals <b>${fmt(A.total)}</b>. <b>${esc(A.leader.k)}</b> leads with <b>${pct(A.leaderShare)}%</b>; the top 3 hold <b>${pct(A.top3Share)}%</b>.`,
    ledeNo:'This report is auto-generated from live Databricks query results.',
    insLeader:(A,mn)=>`Leader <b>${esc(A.leader.k)}</b>: ${mn} reaches <span class="hl">${fmt(A.leader.v)}</span>, <span class="hl">${pct(A.leaderShare)}%</span> of total${A.ratio?`, <span class="hl">${A.ratio.toFixed(1)}×</span> the #2 <b>${esc(A.second.k)}</b>`:''}.`,
    insConc:(A,cl)=>`Head concentration is <b>${cl}</b>: top 3 (${esc(A.arr.slice(0,3).map(x=>x.k).join(' / '))}) hold <span class="hl-g">${pct(A.top3Share)}%</span>.`,
    insTail:(A,dn)=>`Long tail: the remaining <span class="hl-v">${A.tailN}</span> ${dn} hold only <span class="hl-v">${pct(A.tailShare)}%</span> — a clear head effect.`,
    insScale:(A,dn,mn)=>`Scale: ${A.n} ${dn}, ${mn} totals <span class="hl-a">${fmt(A.total)}</span>, avg <span class="hl-a">${fmt(A.total/A.n)}</span>.`,
    sortBy:(mn,dn)=>`${mn} by ${dn} (leader highlighted)`, top20:(n)=>`Top 20 of ${n}`,
    c1:(A)=>`<b>${esc(A.leader.k)} is the core segment</b>, contributing ${pct(A.leaderShare)}% alone${A.ratio&&A.ratio>1.5?`, ${A.ratio.toFixed(1)}× ahead of #2`:''}; prioritise resources here.`,
    c2:(A)=>`Top 3 hold <b>${pct(A.top3Share)}%</b> — ${A.top3Share>0.5?'high concentration, low resilience; watch head volatility':'fairly balanced, growth spread across segments'}.`,
    c3:(A,dn)=>`The long tail of ${A.tailN} ${dn} holds only <b>${pct(A.tailShare)}%</b>; assess ROI of high-potential ones or trim.`,
    cNo:(n)=>`This result is <b>${n}</b> detail/aggregate rows; use a <b>GROUP BY</b> aggregate query for visual insights.`,
    caveat:(sql)=>`Notes: ${caveatBits(sql,'en')}data from Databricks <b>prod_trusted</b> (read via dev workspace); figures computed live from the query result, not cached.`,
  }
};
function L(){return DICT[curLang()]||DICT.zh;}

let _rep=null;
async function load(){
  if(!id){$('#root').innerHTML='<div class="page"><div class="err">missing report id</div></div>';return;}
  try{_rep=await (await fetch('/api/report?id='+encodeURIComponent(id))).json();}
  catch(e){$('#root').innerHTML='<div class="page"><div class="err">'+esc(e.message)+'</div></div>';return;}
  if(_rep.error){$('#root').innerHTML='<div class="page"><div class="err">'+esc(_rep.error)+'</div></div>';return;}
  render(_rep);
}

function pct(x){return (x*100).toFixed(1);}
function analyze(dim,m,rows){
  const arr=rows.map(r=>({k:r[dim.name],v:num(r[m.name])})).filter(x=>x.v!=null).sort((a,b)=>b.v-a.v);
  const total=arr.reduce((s,x)=>s+x.v,0)||1, n=arr.length;
  const top3=arr.slice(0,3).reduce((s,x)=>s+x.v,0);
  return {arr,total,n,leader:arr[0],second:arr[1],
    leaderShare:arr[0]?arr[0].v/total:0, top3Share:top3/total,
    ratio:(arr[0]&&arr[1]&&arr[1].v)?arr[0].v/arr[1].v:null,
    tailN:Math.max(0,n-5), tailShare:arr.slice(5).reduce((s,x)=>s+x.v,0)/total};
}

function render(rep){
  const T=L(), d=rep.result||{}, cols=(d.data&&d.data.columns)||[], rows=(d.data&&d.data.rows)||[];
  const {dims,meas,skip}=classify(cols,rows);
  const form=pickForm(dims,meas,rows,skip);
  const now=new Date().toLocaleString(curLang()==='en'?'en-GB':'zh-CN',{hour12:false});
  const catDim=dims.filter(x=>x.role==='cat');
  const isRank=(form==='bar')&&catDim.length>=1&&meas.length===1;
  const A=isRank?analyze(catDim[0],meas[0],rows):null;
  const dimName=catDim[0]?catDim[0].name:T.cat, mName=meas[0]?meas[0].name:'';
  const fl=T.fl[form]||form;

  const lede=A?T.lede(A,esc(dimName),esc(mName)):T.ledeNo;

  let h=`<div class="cover"><div class="cover-in">
    <div class="topbar"><div class="logo">C</div><div class="name">Car Hire<small>AI-Native Data Analysis</small></div>
      <div class="langtoggle" id="langtoggle"><button data-lang="zh">中</button><button data-lang="en">EN</button></div>
      <a class="back" href="/">${T.back}</a></div>
    <div class="eyebrow reveal">${T.eyebrow}</div>
    <h1 class="qtitle reveal">${esc(rep.question||'')}</h1>
    <div class="lede reveal">${lede}</div>
    <div class="chips reveal">
      <span class="chip"><span class="d" style="background:var(--green)"></span>${(d.row_count||rows.length)} ${T.unit_rows}</span>
      <span class="chip">⏱ ${d.execution_time_ms||0} ms</span>
      <span class="chip"><b>databricks</b></span>
      <span class="chip">${T.view} <b>${fl}</b></span>
      <span class="chip">${esc(now)}</span>
    </div></div></div><div class="page">`;

  if(!rows.length){h+='<div class="err">'+T.noresult+'</div></div>';$('#root').innerHTML=h;wireLang();finish();return;}

  if(A){
    const cl=A.top3Share>0.6?T.conc.hi:A.top3Share>0.4?T.conc.mid:T.conc.lo;
    h+=`<div class="sec reveal"><div class="sechead"><span class="secno">01</span><span class="sectitle">${T.sec.summary}</span><span class="secsub">${T.autogen}</span></div>
      <div class="insights">
        <div class="insight"><div class="ic">🏆</div><div class="tx">${T.insLeader(A,esc(mName))}</div></div>
        <div class="insight"><div class="ic">📊</div><div class="tx">${T.insConc(A,cl)}</div></div>
        <div class="insight"><div class="ic">📉</div><div class="tx">${T.insTail(A,esc(dimName))}</div></div>
        <div class="insight"><div class="ic">Σ</div><div class="tx">${T.insScale(A,esc(dimName),esc(mName))}</div></div>
      </div></div>`;
  }

  const accents=['--brand','--green','--violet','--amber'];
  h+=`<div class="sec reveal"><div class="sechead"><span class="secno">02</span><span class="sectitle">${T.sec.kpi}</span></div><div class="kpirow">`;
  h+=`<div class="kpi" style="--accent:var(--brand)"><div class="k">${T.k.rows}</div><div class="v cnt" data-to="${d.row_count||rows.length}" style="color:var(--brand)">0</div><div class="sub">${cols.length} ${T.k.cols}</div></div>`;
  meas.slice(0,3).forEach((m,idx)=>{const s=stats(rows,m);if(!s)return;
    h+=`<div class="kpi" style="--accent:var(${accents[(idx+1)%4]})"><div class="k">${esc(m.name)} · ${T.k.total}</div><div class="v cnt" data-to="${s.sum}" style="color:var(${accents[(idx+1)%4]})">0</div><div class="sub">${T.k.avg} ${fmt(s.avg)} · ${T.k.peak} ${fmt(s.max)}</div></div>`;});
  h+='</div></div>';

  h+=`<div class="sec reveal"><div class="sechead"><span class="secno">03</span><span class="sectitle">${T.sec.overview} · ${fl}</span><span class="secsub">${T.autoform}</span></div><div class="card">`;
  if(isRank){
    h+=`<div style="color:var(--viz-muted);font-size:12px;margin-bottom:14px">${T.sortBy(esc(mName),esc(dimName))}</div><div class="bars">`;
    A.arr.slice(0,20).forEach((x,idx)=>{const w=(x.v/A.leader.v*100);
      h+=`<div class="bar-row ${idx===0?'top':''}"><div class="lbl">${esc(String(x.k))}</div><div class="bar-track"><div class="bar-fill" data-w="${w.toFixed(2)}"></div></div><div class="val">${fmt(x.v)}${idx===0?`<span class="badge">${T.badge}</span>`:''}</div></div>`;});
    h+='</div>';
    if(A.n>20)h+=`<div style="color:var(--faint);font-size:11px;margin-top:10px">${T.top20(A.n)}</div>`;
  }else{ h+=buildChart(form,cols,rows,dims,meas); }
  h+='</div></div>';

  if(isRank){
    const s=stats(rows,meas[0]);
    h+=`<div class="sec reveal"><div class="two">
      <div><div class="sechead"><span class="secno">04</span><span class="sectitle">${T.sec.comp}</span></div><div class="card">${donutSVG(A)}</div></div>
      <div><div class="sechead"><span class="secno">05</span><span class="sectitle">${esc(mName)} · ${T.sec.dist}</span></div><div class="card"><div class="statgrid">
        <div class="ministat"><div class="k">${T.k.total}</div><div class="v" style="color:var(--green)">${fmt(s.sum)}</div></div>
        <div class="ministat"><div class="k">${T.k.avg}</div><div class="v">${fmt(s.avg)}</div></div>
        <div class="ministat"><div class="k">${T.k.median}</div><div class="v">${fmt(median(A.arr.map(x=>x.v)))}</div></div>
        <div class="ministat"><div class="k">${T.k.max}</div><div class="v" style="color:var(--brand)">${fmt(s.max)}</div></div>
        <div class="ministat"><div class="k">${T.k.min}</div><div class="v">${fmt(s.min)}</div></div>
        <div class="ministat"><div class="k">${T.k.top1}</div><div class="v" style="color:var(--violet)">${pct(A.leaderShare)}%</div></div>
      </div></div></div></div></div>`;
  }

  const secC=isRank?'06':'04';
  h+=`<div class="sec reveal"><div class="sechead"><span class="secno">${secC}</span><span class="sectitle">${T.sec.concl}</span></div><div class="concl"><ul>`;
  if(A){
    h+=`<li><span class="n">1</span><div>${T.c1(A)}</div></li><li><span class="n">2</span><div>${T.c2(A)}</div></li><li><span class="n">3</span><div>${T.c3(A,esc(dimName))}</div></li>`;
  }else{ h+=`<li><span class="n">1</span><div>${T.cNo(d.row_count||rows.length)}</div></li>`; }
  h+=`</ul><div class="caveat">${T.caveat(rep.sql)}</div></div></div>`;

  const secT=isRank?'07':'05';
  h+=`<div class="sec reveal"><div class="sechead"><span class="secno">${secT}</span><span class="sectitle">${T.sec.detail}</span><span class="secsub">${rows.length} ${T.unit_rows} · ${cols.length} ${T.k.cols}</span></div>
    <div class="tablewrap"><table class="dt"><thead><tr>${cols.map(c=>`<th>${esc(c.name)} <span style="color:var(--faint);font-weight:400">${esc(c.type||'')}</span></th>`).join('')}</tr></thead>
    <tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${esc(typeof r[c.name]==='object'?JSON.stringify(r[c.name]):r[c.name])}</td>`).join('')}</tr>`).join('')}</tbody></table></div></div>`;

  const secS=isRank?'08':'06';
  h+=`<div class="sec reveal"><div class="sechead"><span class="secno">${secS}</span><span class="sectitle">${T.sec.sql}</span><span class="secsub">${T.sqlsub}</span></div><pre class="sql">${esc(rep.sql||'')}</pre></div>`;
  h+=`<div class="foot">${T.foot}</div></div>`;

  $('#root').innerHTML=h;
  wireLang();
  finish();
}
function wireLang(){
  const box=document.querySelector('#langtoggle');if(!box)return;
  box.querySelectorAll('button').forEach(b=>{b.classList.toggle('active',b.dataset.lang===curLang());
    b.onclick=()=>{setLang(b.dataset.lang);render(_rep);};});
}

function median(v){const a=[...v].sort((x,y)=>x-y),m=Math.floor(a.length/2);return a.length%2?a[m]:(a[m-1]+a[m])/2;}
function donutSVG(A){
  const N=Math.min(A.arr.length,8);let items=A.arr.slice(0,N).map(x=>({k:x.k,v:x.v}));
  if(A.arr.length>N)items.push({k:t('c_other'),v:A.arr.slice(N).reduce((s,x)=>s+x.v,0)});
  const total=items.reduce((s,x)=>s+x.v,0)||1, R=80, C=2*Math.PI*R, cx=110,cy=110,sw=30;
  let off=0,seg='',leg='';
  items.forEach((it,k)=>{const frac=it.v/total, len=frac*C, col=`var(${CATV[k%8]})`;
    seg+=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 ${cx} ${cy})"><title>${esc(it.k)}: ${fmt(it.v)} (${pct(frac)}%)</title></circle>`;
    leg+=`<div class="lg"><span class="sw" style="background:${col}"></span><span>${esc(it.k)}</span><span class="lv">${fmt(it.v)}</span><span class="lp">${pct(frac)}%</span></div>`;
    off+=len;});
  return `<div class="donut-wrap"><div class="donut"><svg viewBox="0 0 220 220" width="220" height="220">${seg}</svg><div class="center"><div class="cv">${A.n}</div><div class="cl">${L().cat}</div></div></div><div class="legend">${leg}</div></div>`;
}

function finish(){
  // scroll reveal
  const io=new IntersectionObserver((es)=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.12});
  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
  // count-up
  setTimeout(()=>document.querySelectorAll('.cnt').forEach(el=>countUp(el,+el.dataset.to)),250);
  // bars grow (staggered)
  setTimeout(()=>document.querySelectorAll('.bar-fill').forEach((el,i)=>setTimeout(()=>{el.style.width=el.dataset.w+'%';},i*45)),350);
}
function countUp(el,to){
  const dur=900,t0=performance.now();
  function step(t){const p=Math.min(1,(t-t0)/dur),e=1-Math.pow(1-p,3),val=to*e;
    el.textContent=fmt(Math.round(val));if(p<1)requestAnimationFrame(step);else el.textContent=fmt(to);}
  requestAnimationFrame(step);
}
load();
</script>
</body>
</html>
